{% extends "base.html" %}

{% block title %}{{ t.registro_titulo }} - KOOK{% endblock %}

{% block content %}
<div class="container" style="max-width: 600px;">
    <div style="background: white; padding: 40px; border-radius: 15px;">
        <h1 style="color: #D84731; text-align: center;">{{ t.registro_titulo }}</h1>
        <form method="POST">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div><label>{{ t.registro_nombre }}</label><input type="text" name="nombre" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
                <div><label>{{ t.registro_apellidos }}</label><input type="text" name="apellidos" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            </div>
            <div style="margin-top: 15px;"><label>{{ t.registro_email }}</label><input type="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            <div style="margin-top: 15px;"><label>{{ t.registro_telefono }}</label><input type="tel" name="telefono" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            <div style="margin-top: 15px;"><label>{{ t.registro_direccion }}</label><input type="text" name="direccion" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            <div style="margin-top: 15px;"><label>{{ t.registro_password }}</label><input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            <div style="margin-top: 15px;"><label>{{ t.registro_confirm_password }}</label><input type="password" name="confirm_password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></div>
            <div style="margin-top: 15px;">
                <label><input type="checkbox" name="acepto" required> {{ t.registro_acepto }}</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">{{ t.registro_boton }}</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">{{ t.registro_ya_tienes_cuenta }} <a href="/login">{{ t.registro_inicia_sesion }}</a></p>
    </div>
</div>
{% endblock %}
