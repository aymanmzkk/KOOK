{% extends "base.html" %}

{% block title %}{{ t.login_titulo }} - KOOK{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px;">
    <div style="background: white; padding: 40px; border-radius: 15px;">
        <h1 style="color: #D84731; text-align: center;">{{ t.login_titulo }}</h1>
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label>{{ t.login_email }}</label>
                <input type="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>{{ t.login_password }}</label>
                <input type="password" name="password" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">{{ t.login_entrar }}</button>
        </form>
        <p style="text-align: center; margin-top: 20px;">{{ t.login_no_cuenta }} <a href="/registro">{{ t.login_registrate }}</a></p>
    </div>
</div>
{% endblock %}
