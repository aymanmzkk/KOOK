{% extends "base.html" %}

{% block title %}{{ t.contacto }} - KOOK{% endblock %}

{% block content %}
<div class="container" style="max-width: 700px;">
    <div style="background: white; padding: 40px; border-radius: 15px;">
        <h1 style="color: #D84731; text-align: center;">{{ t.contacto }}</h1>
        <form method="POST">
            <div style="margin-bottom: 15px;">
                <label>{{ t.registro_nombre }}</label>
                <input type="text" name="nombre" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>{{ t.login_email }}</label>
                <input type="email" name="email" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Mensaje</label>
                <textarea name="mensaje" rows="5" required style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">{{ t.login_entrar }}</button>
        </form>
    </div>
</div>
{% endblock %}
